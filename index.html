<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul's Terminal</title>
    <style>
        body {
            background-color: #121212;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .terminal {
            background-color: #1a1a1a;
            border: 2px solid #333;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0px 0px 15px rgba(0, 255, 0, 0.2);
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #ffffff; font-size: 24px; margin-top: 0; }
        .accent { color: #00bcff; }
        a { color: #ff007f; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="terminal">
        <h1>rahul@thinkpad-t510:~</h1>
        <p><span class="accent">> status:</span> Learning to code on Linux Mint.</p>
        <p><span class="accent">> projects:</span> Built a custom AI Discord Bot.</p>
        <p><span class="accent">> machine:</span> Lenovo ThinkPad T510 (Core i5 / Linux).</p>
        <hr style="border-color: #333;">
        <p>Connect with me on <a href="https://discord.com" target="_blank">Discord</a></p>
    </div>

</body>
</html>
